name: Build Plugin

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Build
        run: mvn clean package --batch-mode

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: LogSlow
          path: target/*.jar
