name: Build LogSlow

on:
  push:
    branches:
      - main
      - master

  pull_request:

  workflow_dispatch:

jobs:
  build:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Verify Maven
        run: mvn -version

      - name: Build plugin
        run: mvn clean package --batch-mode

      - name: Upload jar
        uses: actions/upload-artifact@v4
        with:
          name: LogSlow
          path: target/*.jar
